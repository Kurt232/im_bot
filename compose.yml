services:
  worker:
    build: .
    container_name: cc-${PROJECT_NAME:-cc}
    stdin_open: true
    tty: true
    volumes:
      - .:/workspace
      - .docker-claude/config:/home/cc-worker/.claude
      - .docker-claude/claude.json:/home/cc-worker/.claude.json
    env_file:
      - path: .env
        required: false
    environment:
      - ANTHROPIC_API_KEY
      - MODEL
      - EFFORT
      - TIMEOUT

  bot:
    build:
      context: .
      dockerfile: Dockerfile.bot
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    volumes:
      - ./.token_cache.json:/app/.token_cache.json
